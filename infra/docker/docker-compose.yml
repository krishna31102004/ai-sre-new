name: glassbox-sre

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: glassbox-sre-postgres
    environment:
      POSTGRES_DB: glassbox_sre
      POSTGRES_USER: glassbox_sre
      POSTGRES_PASSWORD: glassbox_sre
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glassbox_sre -d glassbox_sre"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: glassbox-sre-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  otel-demo-placeholder:
    image: alpine:3.20
    profiles: ["otel-demo-placeholder"]
    command: ["sh", "-c", "echo 'OpenTelemetry demo wiring comes next.' && sleep infinity"]

volumes:
  postgres-data:
  redis-data:
