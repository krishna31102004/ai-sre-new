groups:
  - name: otel-demo-phase-0
    interval: 15s
    rules:
      - alert: OTelDemoAdServiceErrors
        expr: |
          sum(increase(http_server_duration_milliseconds_count{service_name="frontend", http_status_code="500"}[30s])) > 0
        for: 15s
        labels:
          severity: page
          service: frontend
        annotations:
          summary: "Frontend is returning 500s while the OpenTelemetry demo fault is active."
          description: "The OpenTelemetry demo frontend is serving fresh HTTP 500 responses, which is the observable symptom produced by the `adFailure` fault in the pinned Phase 0 stack."
