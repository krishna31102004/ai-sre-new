groups:
  - name: otel-demo-phase-0
    interval: 15s
    rules:
      - alert: OTelDemoAdServiceErrors
        expr: |
          sum(rate(traces_span_metrics_calls_total{service_name="ad", status_code="STATUS_CODE_ERROR"}[5m])) > 0.01
        for: 15s
        labels:
          severity: page
          service: ad
        annotations:
          summary: "Ad service is returning errors in the OpenTelemetry demo."
          description: "The OpenTelemetry demo ad service has sustained error span calls over the last five minutes."
