global:
  scrape_interval: 15s
  evaluation_interval: 15s

otlp:
  keep_identifying_resource_attributes: true
  promote_resource_attributes:
    - service.name
    - service.namespace
    - service.version
    - service.criticality
    - deployment.environment.name
    - container.name
    - host.name

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

storage:
  tsdb:
    out_of_order_time_window: 30m
